<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Télécharger Lucid</title>
  <style>
    :root {
      --bg: #f6f7f9; --fg: #16181d; --muted: #5b616e; --card: #ffffff;
      --border: #e4e7ec; --accent: #6d5cff; --accent-fg: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0c0d10; --fg: #eceef2; --muted: #9aa0ad; --card: #16181d;
        --border: #262a32; --accent: #8b7dff; --accent-fg: #0c0d10;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: var(--bg); color: var(--fg);
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 2rem;
    }
    .wrap { width: 100%; max-width: 460px; text-align: center; }
    h1 { font-size: 2rem; margin: 0 0 .25rem; letter-spacing: -.02em; }
    p.tag { color: var(--muted); margin: 0 0 2rem; }
    .btns { display: grid; gap: .75rem; }
    a.btn {
      display: flex; align-items: center; justify-content: center; gap: .6rem;
      padding: .95rem 1.25rem; border-radius: 12px; text-decoration: none;
      font-weight: 600; border: 1px solid var(--border); background: var(--card);
      color: var(--fg); transition: transform .08s ease, border-color .15s ease;
    }
    a.btn:hover { transform: translateY(-1px); border-color: var(--accent); }
    a.btn.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
    a.btn svg { width: 20px; height: 20px; }
    .note { color: var(--muted); font-size: .8rem; margin-top: 1.75rem; }
    .note a { color: var(--accent); }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Lucid</h1>
    <p class="tag">Votre second cerveau, 100&nbsp;% en local.</p>
    <div class="btns">
      <a class="btn primary" href="https://github.com/Kywi0x/lucid/releases/latest/download/Lucid-macOS-arm64.dmg">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.4 12.6c0-2.3 1.9-3.4 2-3.5-1.1-1.6-2.8-1.8-3.4-1.8-1.4-.1-2.8.9-3.5.9s-1.8-.8-3-.8c-1.5 0-3 .9-3.8 2.3-1.6 2.8-.4 7 1.2 9.3.8 1.1 1.7 2.4 2.9 2.3 1.2 0 1.6-.7 3-.7s1.8.7 3 .7 2-1.1 2.8-2.2c.9-1.3 1.2-2.5 1.3-2.6-.1 0-2.4-1-2.5-3.6zM14.1 5.4c.6-.8 1.1-1.9 1-3-1 0-2.1.6-2.8 1.4-.6.7-1.1 1.8-1 2.9 1.1.1 2.2-.5 2.8-1.3z"/></svg>
        Télécharger pour Mac
      </a>
      <a class="btn" href="https://github.com/Kywi0x/lucid/releases/latest/download/Lucid-Windows-setup.exe">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 5.5 10.5 4.4v7.1H3zm0 13L10.5 19.6v-7H3zM11.5 4.3 21 3v8.5h-9.5zM11.5 12.5H21V21l-9.5-1.3z"/></svg>
        Télécharger pour Windows
      </a>
    </div>
    <p class="note">
      App non signée en v1 : macOS → clic droit sur l'app → <em>Ouvrir</em> ;
      Windows → <em>Informations complémentaires → Exécuter quand même</em>.<br>
      Toutes les versions sur <a href="https://github.com/Kywi0x/lucid/releases">GitHub Releases</a>.
    </p>
  </main>
</body>
</html>
