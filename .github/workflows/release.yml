name: Release (dmg + exe)

# Deux déclencheurs :
#  - Tag `v*` (ex. `git tag v0.1.0 && git push origin v0.1.0`) → release versionnée figée.
#  - Push sur `main` → build auto qui met à jour l'asset de la release `alpha`
#    (URL stable `releases/download/alpha/Lucid-macOS-arm64.dmg`, toujours = dernier main).
# Dans les deux cas : build macOS (.dmg) + Windows (.exe NSIS) + copies à nom fixe.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Sidecars (macOS)
        if: runner.os == 'macOS'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          brew install poppler tesseract tesseract-lang dylibbundler
          ./scripts/bundle-sidecars.sh

      - name: Sidecars (Windows)
        if: runner.os == 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pwsh scripts/bundle-sidecars.ps1

      - name: Build + release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Compte/sauvegarde cloud Supabase (optionnel) : si les secrets sont vides,
          # supabase=null → l'app reste 100 % locale, section Compte « non configuré ».
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Creds OAuth Google bakés au build (option_env! dans google_drive.rs) → l'user
          # n'a rien à saisir. Le client_secret n'est plus critique (PKCE), mais reste un secret CI.
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        with:
          # Release seulement sur push de tag v* ; en workflow_dispatch (test), on
          # build sans publier de release (évite de créer un tag « main » parasite).
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Lucid {0}', github.ref_name) || '' }}
          releaseBody: "Téléchargez le .dmg (macOS) ou le .exe (Windows) ci-dessous."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Copie à nom fixe → lien stable. Tag v* → sa release ; push main → release `alpha`.
      - name: Stable-named asset (macOS)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'alpha' }}
        run: |
          dmg=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          cp "$dmg" "Lucid-macOS-arm64.dmg"
          # ponytail: crée la release alpha si absente ; sinon on clobbe juste l'asset.
          gh release view "$TARGET" >/dev/null 2>&1 || \
            gh release create "$TARGET" --prerelease \
              --title "Lucid ($TARGET — dernier build de main)" \
              --notes "Build automatique du dernier commit sur \`main\`. Les installateurs ci-dessous sont mis à jour à chaque push."
          gh release upload "$TARGET" "Lucid-macOS-arm64.dmg" --clobber

      - name: Stable-named asset (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'alpha' }}
        shell: pwsh
        run: |
          $exe = Get-ChildItem src-tauri/target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
          Copy-Item $exe.FullName "Lucid-Windows-setup.exe"
          gh release view $env:TARGET *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:TARGET --prerelease --title "Lucid ($env:TARGET — dernier build de main)" --notes "Build automatique du dernier commit sur main."
          }
          gh release upload $env:TARGET "Lucid-Windows-setup.exe" --clobber
