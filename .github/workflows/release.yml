name: Release (dmg + exe)

# Deux déclencheurs :
#  - Tag `v*` (ex. `git tag v0.1.0 && git push origin v0.1.0`) → release versionnée figée.
#  - Push sur `main` → build auto qui met à jour l'asset de la release `alpha`
#    (URL stable `releases/download/alpha/Lucid-macOS-arm64.dmg`, toujours = dernier main).
# Dans les deux cas : build macOS (.dmg) + Windows (.exe NSIS) + copies à nom fixe.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Sidecars (macOS)
        if: runner.os == 'macOS'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          brew install poppler tesseract tesseract-lang dylibbundler
          ./scripts/bundle-sidecars.sh

      - name: Sidecars (Windows)
        if: runner.os == 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pwsh scripts/bundle-sidecars.ps1

      # Overlay de config par canal : version dérivée du tag, et endpoint updater
      # beta si le tag contient un pré-release (ex. v0.2.0-beta.1). Sans tag → {}.
      # Canal stable = endpoint par défaut de tauri.conf.json (releases/latest).
      - name: Channel overlay
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VER="${GITHUB_REF_NAME#v}"
            if [[ "$VER" == *-* ]]; then
              printf '{"version":"%s","plugins":{"updater":{"endpoints":["https://github.com/Kywi0x/lucid/releases/download/beta/latest.json"]}}}' "$VER" > overlay.conf.json
            else
              printf '{"version":"%s"}' "$VER" > overlay.conf.json
            fi
          else
            echo '{}' > overlay.conf.json
          fi
          cat overlay.conf.json

      - name: Build + release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signature des artefacts updater (minisign) — obligatoire pour tauri-plugin-updater.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          # Compte/sauvegarde cloud Supabase (optionnel) : si les secrets sont vides,
          # supabase=null → l'app reste 100 % locale, section Compte « non configuré ».
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Creds OAuth Google bakés au build (option_env! dans google_drive.rs) → l'user
          # n'a rien à saisir. Le client_secret n'est plus critique (PKCE), mais reste un secret CI.
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          # Crash reporting Sentry (optionnel, ADR-0016) : DSN baké au build (option_env!).
          # Secret absent → app sans Sentry, et de toute façon opt-in côté user.
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        with:
          # Release seulement sur push de tag v* ; en workflow_dispatch (test), on
          # build sans publier de release (évite de créer un tag « main » parasite).
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Lucid {0}', github.ref_name) || '' }}
          releaseBody: "Téléchargez le .dmg (macOS) ou le .exe (Windows) ci-dessous."
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }} --config overlay.conf.json

      # Copie à nom fixe → lien stable. Tag v* → sa release ; push main → release `alpha`.
      - name: Stable-named asset (macOS)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'alpha' }}
        run: |
          dmg=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          cp "$dmg" "Lucid-macOS-arm64.dmg"
          # ponytail: crée la release alpha si absente ; sinon on clobbe juste l'asset.
          gh release view "$TARGET" >/dev/null 2>&1 || \
            gh release create "$TARGET" --prerelease \
              --title "Lucid ($TARGET — dernier build de main)" \
              --notes "Build automatique du dernier commit sur \`main\`. Les installateurs ci-dessous sont mis à jour à chaque push."
          gh release upload "$TARGET" "Lucid-macOS-arm64.dmg" --clobber

      - name: Stable-named asset (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'alpha' }}
        shell: pwsh
        run: |
          $exe = Get-ChildItem src-tauri/target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
          Copy-Item $exe.FullName "Lucid-Windows-setup.exe"
          gh release view $env:TARGET *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:TARGET --prerelease --title "Lucid ($env:TARGET — dernier build de main)" --notes "Build automatique du dernier commit sur main."
          }
          gh release upload $env:TARGET "Lucid-Windows-setup.exe" --clobber

  # Pointeur du canal beta : release fixe `beta` dont le latest.json est réécrit à
  # chaque tag (beta ET stable — semver fait que 0.2.0 > 0.2.0-beta.N, donc les
  # testeurs beta reçoivent aussi les stables). Le canal stable n'a pas besoin de
  # pointeur : releases/latest/download/latest.json est géré par GitHub.
  updater-pointer:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Repoint beta channel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh release download "$GITHUB_REF_NAME" -R "$REPO" -p latest.json
          gh release view beta -R "$REPO" >/dev/null 2>&1 || \
            gh release create beta --prerelease -R "$REPO" \
              --title "Canal beta (pointeur updater)" \
              --notes "Release technique : héberge le latest.json du canal beta. Ne pas supprimer."
          gh release upload beta latest.json --clobber -R "$REPO"
